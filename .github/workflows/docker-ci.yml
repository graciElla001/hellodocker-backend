name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Set SHA
      id: vars
      run: echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
 
    - name: Build Docker images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hellodocker-backend:latest .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hellodocker-backend:${{ steps.vars.outputs.SHA }} .
        
    - name: Push Docker images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/hellodocker-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/hellodocker-backend:${{ steps.vars.outputs.SHA }}
